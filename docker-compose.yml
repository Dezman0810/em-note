# Основной локальный стек: UI http://localhost:5173/ · API http://localhost:8000/docs
# (облако / VPS — отдельно через docker-compose.prod.yml после merge в репозиторий).
#
# Разработка на Windows: весь стек в Docker (API + БД + Vite). Нужен backend/.env (из .env.example).
# После изменений backend/Dockerfile: docker compose build --no-cache api
#
# Распознавание (Vosk): в образе API — ffmpeg и модель small-ru в /opt/vosk-model (см. backend/Dockerfile).
# Свою модель: смонтируйте в /opt/vosk-custom и задайте VOSK_MODEL_PATH=/opt/vosk-custom/...
#
#   docker compose up --build -d
#
# UI http://localhost:5173/  ·  API http://localhost:8000/docs
# PostgreSQL: localhost:5432 (логин/пароль postgres/postgres, БД note и em_note_test)

name: em-note

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: note
    ports:
      - "5432:5432"
    volumes:
      - em_note_pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/note
      ATTACHMENTS_DIR: /app/data/attachments
      # Образ backend/Dockerfile ставит ffmpeg в /usr/bin (не зависит от PATH хоста Windows)
      FFMPEG_PATH: /usr/bin/ffmpeg
      VOSK_MODEL_PATH: /opt/vosk-model/vosk-model-small-ru-0.22
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - em_note_attachments:/app/data/attachments
    ports:
      - "8000:8000"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  # node_modules лежит в ./frontend/node_modules (как при локальном npm install), без отдельного тома —
  # иначе после git pull с новыми зависимостями том мог оставаться со старыми пакетами («Failed to resolve import»).
  web:
    image: node:20-bookworm-slim
    working_dir: /app
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - ./deploy/docker-web-dev.sh:/docker-web-dev.sh:ro
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://api:8000
    # Скрипт: npm ci при изменении package-lock.json или при отсутствии таблиц TipTap (см. deploy/docker-web-dev.sh).
    # Прод: deploy/Dockerfile.web — npm ci при сборке образа.
    command: ["sh", "/docker-web-dev.sh"]

volumes:
  em_note_pg_data:
  em_note_attachments:

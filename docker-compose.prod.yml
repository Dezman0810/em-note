# Продакшен-стек: Nginx (собранный Vue) + API + PostgreSQL. Dev — docker-compose.yml.

# Веб снаружи: ${COMPOSE_WEB_PORT:-8080}->80 в контейнере. Для порта 80 на хосте задайте COMPOSE_WEB_PORT=80 (часто за reverse-proxy).

# API при старте применяет миграции Alembic (см. backend/docker-entrypoint.sh).

#

#   docker compose -f docker-compose.prod.yml up -d --build

#

# Пароли и имя БД переопределяются через POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB.

# В backend/.env можно задать JWT и CORS; DATABASE_URL в compose задаётся для хоста db.

name: em-note-prod

services:
  db:
    # AWS Public ECR — без лимита анонимных pull с Docker Hub на маленьких VPS
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-note}
    volumes:
      - em_note_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 15

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-note}
      ATTACHMENTS_DIR: /app/data/attachments
      FFMPEG_PATH: /usr/bin/ffmpeg
      VOSK_MODEL_PATH: /opt/vosk-model/vosk-model-small-ru-0.22
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - em_note_attachments:/app/data/attachments

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    ports:
      - "${COMPOSE_WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  em_note_pg_data:
  em_note_attachments:

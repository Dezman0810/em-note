# Сборка api + web на runner'ах GitHub (быстро, много RAM), push в GHCR.
# На VPS: только pull образов — без npm/vite на 1 ГБ RAM.
name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Owner lowercase (GHCR)
        id: o
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-api:main
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web (Nginx + dist)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-web:main
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # VPS: docker pull без логина — включаем Public на пакетах GHCR.
  make-public:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set GHCR packages to public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: |
          set -e
          TOKEN="${GH_PACKAGES_PAT:-$GITHUB_TOKEN}"
          for PKG in em-note-api em-note-web; do
            R=$(curl -sS -o /tmp/body -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${PKG}" \
              -d '{"visibility":"public"}') || true
            echo "user/container/${PKG} -> ${R}"
            if [ "$R" = "200" ] || [ "$R" = "204" ]; then continue; fi
            O="${{ github.repository_owner }}"
            R2=$(curl -sS -o /tmp/body2 -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/orgs/${O}/packages/container/${PKG}" \
              -d '{"visibility":"public"}') || true
            echo "orgs/${O}/container/${PKG} -> ${R2}"
          done
          echo "Если HTTP не 200/204 — GitHub → Packages → каждый пакет → Package settings → Change visibility → Public"

# Сборка api + web на runner'ах GitHub (быстро, много RAM), push в GHCR.
# На VPS: только pull образов — без npm/vite на 1 ГБ RAM.
name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Owner lowercase (GHCR)
        id: o
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-api:main
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web (Nginx + dist)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-web:main
            ${{ env.REGISTRY }}/${{ steps.o.outputs.owner_lc }}/em-note-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Анонимный docker pull на VPS: делаем публичными все container-пакеты em-note-* в GHCR.
  # Если GITHUB_TOKEN не даст PATCH (редко), добавьте в Secrets репозитория GH_PACKAGES_PAT (classic PAT: write:packages).
  make-public:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Wait for GHCR metadata
        run: sleep 35
      - name: List container packages + PATCH visibility=public
        env:
          TOKEN: ${{ secrets.GH_PACKAGES_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          AUTH="${TOKEN:-$GITHUB_TOKEN}"
          api() { curl -sS -H "Authorization: Bearer ${AUTH}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "$@"; }
          api -o /tmp/pkgs.json "https://api.github.com/user/packages?package_type=container&per_page=100"
          NAMES="$(jq -r '.[].name' /tmp/pkgs.json | grep -E '^(em-note-api|em-note-web)$' || true)"
          if [ -z "$NAMES" ]; then
            echo "WARN: package list empty; using fixed names"
            NAMES="$(printf '%s\n' 'em-note-api' 'em-note-web')"
          fi
          while IFS= read -r PKG; do
            [ -n "$PKG" ] || continue
            R=$(api -o /tmp/pbody -w "%{http_code}" -X PATCH \
              "https://api.github.com/user/packages/container/${PKG}" \
              -d '{"visibility":"public"}') || true
            echo "PATCH user/packages/container/${PKG} -> HTTP ${R}"
          done <<< "$NAMES"
          O="${{ github.repository_owner }}"
          for PKG in em-note-api em-note-web; do
            R=$(api -o /tmp/obody -w "%{http_code}" -X PATCH \
              "https://api.github.com/orgs/${O}/packages/container/${PKG}" \
              -d '{"visibility":"public"}') || true
            echo "PATCH orgs/${O}/.../${PKG} -> HTTP ${R}"
          done
          OWNER_LC=$(echo "$O" | tr '[:upper:]' '[:lower:]')
          curl -sS -o /dev/null -w "GHCR manifest em-note-api: HTTP %{http_code}\n" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/${OWNER_LC}/em-note-api/manifests/main" || true
          curl -sS -o /dev/null -w "GHCR manifest em-note-web: HTTP %{http_code}\n" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/${OWNER_LC}/em-note-web/manifests/main" || true

  # Жёсткая проверка: образы можно скачать БЕЗ docker login (как на VPS).
  verify-anonymous-pull:
    needs: make-public
    runs-on: ubuntu-latest
    steps:
      - name: Anonymous docker pull (must succeed for VPS)
        run: |
          set -euo pipefail
          O="${{ github.repository_owner }}"
          OLC=$(echo "$O" | tr '[:upper:]' '[:lower:]')
          docker pull "ghcr.io/${OLC}/em-note-api:main"
          docker pull "ghcr.io/${OLC}/em-note-web:main"
          echo "OK: оба образа доступны анонимно. Если здесь ошибка — откройте Packages на GitHub и сделайте em-note-api / em-note-web Public, либо добавьте secret GH_PACKAGES_PAT (classic, write:packages) и перезапустите workflow."

# API из GHCR (публичный pull); фронт собирается на сервере, если образ em-note-web ещё private.
# После того как в GitHub сделаете пакет em-note-web Public — можно перейти на docker-compose.ghcr.yml.
name: em-note-prod

services:
  db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-note}
    volumes:
      - em_note_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 15

  api:
    image: ghcr.io/${GHCR_OWNER:-dezman0810}/em-note-api:${IMAGE_TAG:-main}
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-note}
      ATTACHMENTS_DIR: /app/data/attachments
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - em_note_attachments:/app/data/attachments

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    ports:
      - "${COMPOSE_WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  em_note_pg_data:
  em_note_attachments:
